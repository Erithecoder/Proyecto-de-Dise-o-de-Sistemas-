version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sgcat_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sgcat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: sgcat_api
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: sgcat_frontend
    ports:
      - "80:80"
    volumes:
      - .:/usr/share/nginx/html

volumes:
  postgres_data: