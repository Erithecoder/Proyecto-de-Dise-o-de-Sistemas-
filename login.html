<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGCAT - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-container">

    <div class="login-card">
        <div class="login-header">
            <h1>SGCAT</h1>
            <p>Sistema de Gestión de Tickets Automático</p>
        </div>

        <form id="form-login">
            <div class="form-group">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="correo" required class="form-input" placeholder="usuario@empresa.com">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="contrasena" required class="form-input" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Ingresar al Sistema</button>
        </form>
    </div>

    <script src="app.js"></script>
    
</body>
</html>
